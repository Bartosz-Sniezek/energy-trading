name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MAILER_FROM: test@example.com
      MAILER_TRANSPORT_MODE: console
      KAFKA_USERS_OUTBOX_TOPIC: users.events.USER
      KAFKA_USERS_OUTBOX_TOPIC_DLQ: users.events.USER.dlq
      EMAIL_NOTIFIER_CONSUMER_GROUP_ID: users.outbox.email-notifiers
      EMAIL_NOTIFIER_CONSUMER_RETRY_BASE_DELAY: 100
      EMAIL_NOTIFIER_CONSUMER_MAX_RETRIES: 5
      KAFKA_LOG_LEVEL: 0
      JWT_ACCESS_TOKEN_SECRET: access_token_secret
      JWT_ACCESS_TOKEN_EXPIRATION_SEC: 900
      JWT_REFRESH_TOKEN_EXPIRATION_SEC: 604800
      COOKIE_SECRET: cookie_secret

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.12.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Unit Tests
        run: pnpm test:unit

      - name: Integration Tests
        run: pnpm test:integration

      - name: E2E Tests
        run: pnpm test:e2e
