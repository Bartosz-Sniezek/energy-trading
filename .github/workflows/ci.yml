name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'packages/**'
      - 'apps/backend/**'
  pull_request:
    branches:
      - '**'
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'packages/**'
      - 'apps/backend/**'

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      MAILER_FROM: test@example.com
      MAILER_TRANSPORT_MODE: console
      KAFKA_USERS_OUTBOX_TOPIC: users.events
      KAFKA_USERS_OUTBOX_TOPIC_DLQ: users.events.dlq
      EMAIL_NOTIFIER_CONSUMER_GROUP_ID: users.outbox.email-notifiers
      EMAIL_NOTIFIER_CONSUMER_RETRY_BASE_DELAY: 100
      EMAIL_NOTIFIER_CONSUMER_MAX_RETRIES: 5
      KAFKA_LOG_LEVEL: 0
      KAFKA_LEDGER_OUTBOX_TOPIC: ledger.events
      KAFKA_LEDGER_USERS_OUTBOX_TOPIC_DLQ: ledger.users.dlq
      KAFKA_LEDGER_USERS_ACCOUNT_CREATED_GROUP: ledger.users.account-created
      JWT_ACCESS_TOKEN_SECRET: access_token_secret
      JWT_ACCESS_TOKEN_EXPIRATION_SEC: 900
      JWT_REFRESH_TOKEN_EXPIRATION_SEC: 604800
      COOKIE_SECRET: cookie_secret
      ACCOUNT_ACTIVATION_RESEND_TOKEN_TTL_SECONDS: 3600
      ALLOWED_ORIGINS: http://localhost:3000
      FRONTEND_BASE_URL: http://localhost:3000
      COMPANY_NAME: EnergyTrading
      PRICE_ENGINE_TICK_TOPIC: price.tick
      PRICE_ENGINE_TICK_INTERVAL_MS: 500

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.12.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @energy-trading/shared build

      - name: Lint
        run: pnpm --filter @energy-trading/backend lint

      - name: Build
        run: pnpm --filter @energy-trading/backend build

      - name: Unit Tests
        run: pnpm --filter @energy-trading/backend test:unit

      - name: Integration Tests
        run: pnpm --filter @energy-trading/backend test:integration

      - name: E2E Tests
        run: pnpm --filter @energy-trading/backend test:e2e
